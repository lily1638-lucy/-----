{% extends "base.html" %}

{% block title %}注册{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 0 auto;">
    <h2>用户注册</h2>
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST">
        <div style="margin-bottom: 15px;">
            <label>用户名</label><br>
            <input type="text" name="username" required style="width: 100%;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>密码</label><br>
            <input type="password" name="password" required style="width: 100%;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>真实姓名</label><br>
            <input type="text" name="real_name" required style="width: 100%;">
        </div>
        <div style="margin-bottom: 15px;">
            <label>角色</label><br>
            <select name="role" style="width: 100%; padding: 8px;">
                <option value="student">学生</option>
                <option value="teacher">教师</option>
            </select>
        </div>
        <button type="submit">注册</button>
    </form>
    <p style="margin-top: 15px;">已有账号？<a href="/auth/login">立即登录</a></p>
</div>
{% endblock %}
