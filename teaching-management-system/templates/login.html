{% extends "base.html" %}

{% block title %}登录 - 教学管理系统{% endblock %}

{% block content %}
<div class="card">
    <div class="text-center" style="margin-bottom: 2.5rem;">
        <div style="width: 90px; height: 90px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 1.5rem;">
            <i class="fas fa-chalkboard-user" style="font-size: 2.8rem; color: white;"></i>
        </div>
        <h2 style="margin-bottom: 0.5rem;">欢迎回来</h2>
        <p style="color: #718096; font-size: 1rem;">登录您的账户，继续学习之旅</p>
    </div>
    
    {% if error %}
        <div class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
    {% endif %}
    
    <form method="POST">
        <div class="form-group">
            <label>
                <i class="fas fa-user"></i> 用户名
            </label>
            <input type="text" name="username" class="form-control" placeholder="请输入用户名" required autofocus>
        </div>
        
        <div class="form-group">
            <label>
                <i class="fas fa-lock"></i> 密码
            </label>
            <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
        </div>
        
        <button type="submit" class="btn btn-primary">
            <i class="fas fa-sign-in-alt"></i> 登录
        </button>
    </form>
    
    <div style="margin-top: 2rem; text-align: center;">
        <p style="color: #718096;">
            还没有账号？ 
            <a href="/auth/register" style="color: #667eea; text-decoration: none; font-weight: 600;">
                立即注册 <i class="fas fa-arrow-right"></i>
            </a>
        </p>
    </div>
    
    <div style="margin-top: 2rem; padding: 1rem; background: #f7fafc; border-radius: 20px;">
        <p style="font-size: 0.85rem; color: #718096; text-align: center; margin: 0;">
            <i class="fas fa-info-circle"></i> 测试账号<br>
            <strong>管理员：</strong> admin / 123456<br>
            <strong>教师：</strong> zhangjg / 123456<br>
            <strong>学生：</strong> wangxiaoming / 123456
        </p>
    </div>
</div>
{% endblock %}
